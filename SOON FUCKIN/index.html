<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiwi – Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 20px;
    }

    .logo {
      font-size: 48px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 16px;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .message {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .highlight {
      color: #22c55e;
      font-weight: 500;
    }

    .footer {
      font-size: 14px;
      color: #64748b;
      margin-top: 40px;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: #22c55e;
      margin: 20px auto;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">Kiwi</div>
    <div class="tagline">Smart Customer Reach Platform</div>

    <div class="divider"></div>

    <div class="message">
      Kiwi is currently under development by the 
      <span class="highlight">Stack Smashers Team</span>.<br><br>
      We are building a powerful system to transform customer reach and digital marketing.<br><br>
    </div>

    <div class="footer">
      Powered by AdSync Engine
    </div>
  </div>

</body>
</html>
